apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: heatshield-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/security-headers: "true"
spec:
  tls:
  - hosts:
    - heatshield.example.com
    secretName: heatshield-tls
  rules:
  - host: heatshield.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: heatshield-frontend-service
            port:
              number: 3000
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: heatshield-backend-service
            port:
              number: 8000
