apiVersion: apps/v1
kind: Deployment
metadata:
  name: heatshield-frontend
  labels:
    app: heatshield-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: heatshield-frontend
  template:
    metadata:
      labels:
        app: heatshield-frontend
    spec:
      containers:
      - name: frontend
        image: heatshield-frontend:latest
        ports:
        - containerPort: 3000
        env:
        - name: NEXT_PUBLIC_API_URL
          valueFrom:
            configMapKeyRef:
              name: heatshield-config
              key: api-url
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: heatshield-frontend-service
spec:
  selector:
    app: heatshield-frontend
  ports:
  - protocol: TCP
    port: 3000
    targetPort: 3000
  type: ClusterIP
