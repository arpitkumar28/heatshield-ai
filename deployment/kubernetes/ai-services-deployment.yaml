apiVersion: apps/v1
kind: Deployment
metadata:
  name: heatshield-ai-services
  labels:
    app: heatshield-ai-services
spec:
  replicas: 2
  selector:
    matchLabels:
      app: heatshield-ai-services
  template:
    metadata:
      labels:
        app: heatshield-ai-services
    spec:
      containers:
      - name: ai-services
        image: heatshield-ai-services:latest
        ports:
        - containerPort: 8001
        env:
        - name: MODEL_PATH
          valueFrom:
            configMapKeyRef:
              name: heatshield-config
              key: model-path
        - name: BATCH_SIZE
          valueFrom:
            configMapKeyRef:
              name: heatshield-config
              key: batch-size
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 60
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 30
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: heatshield-ai-services-service
spec:
  selector:
    app: heatshield-ai-services
  ports:
  - protocol: TCP
    port: 8001
    targetPort: 8001
  type: ClusterIP
