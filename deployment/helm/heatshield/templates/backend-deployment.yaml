apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "heatshield.fullname" . }}-backend
  labels:
    {{- include "heatshield.labels" . | nindent 4 }}
    app: backend
spec:
  replicas: {{ .Values.replicaCount.backend }}
  selector:
    matchLabels:
      {{- include "heatshield.selectorLabels" . | nindent 6 }}
      app: backend
  template:
    metadata:
      labels:
        {{- include "heatshield.selectorLabels" . | nindent 8 }}
        app: backend
    spec:
      containers:
      - name: backend
        image: "{{ .Values.image.backend.repository }}:{{ .Values.image.backend.tag }}"
        imagePullPolicy: {{ .Values.image.backend.pullPolicy }}
        ports:
        - containerPort: {{ .Values.service.backendPort }}
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: {{ include "heatshield.fullname" . }}-secrets
              key: database-url
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: {{ include "heatshield.fullname" . }}-secrets
              key: secret-key
        - name: REDIS_URL
          valueFrom:
            configMapKeyRef:
              name: {{ include "heatshield.fullname" . }}-config
              key: redis-url
        resources:
          {{- toYaml .Values.resources.backend | nindent 10 }}
        livenessProbe:
          httpGet:
            path: /health
            port: {{ .Values.service.backendPort }}
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: {{ .Values.service.backendPort }}
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "heatshield.fullname" . }}-backend-service
  labels:
    {{- include "heatshield.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "heatshield.selectorLabels" . | nindent 4 }}
    app: backend
  ports:
  - protocol: TCP
    port: {{ .Values.service.backendPort }}
    targetPort: {{ .Values.service.backendPort }}
  type: {{ .Values.service.type }}
